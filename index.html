<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DineOS — Super Admin Login</title>
  <meta name="description" content="DineOS Super Admin Portal — Restricted access." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-body">

  <!-- Animated background orbs -->
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- Login Card -->
  <div class="auth-container animate-fadeInUp">
    <div class="auth-card">

      <!-- Brand -->
      <div class="auth-brand">
        <div class="brand-icon">🍽️</div>
        <div>
          <div class="brand-name">DineOS</div>
          <div class="brand-tagline">Super Admin Portal</div>
        </div>
      </div>

      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to manage your restaurant network</p>

      <!-- Error alert -->
      <div id="errorMsg" class="alert alert-error" style="display:none">
        <span class="alert-icon">⚠️</span>
        <span id="errorText"></span>
      </div>

      <!-- Login Form -->
      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">Email Address <span class="required">*</span></label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="admin@dineos.com"
            autocomplete="email"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">Password <span class="required">*</span></label>
          <div class="input-group">
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              autocomplete="current-password"
              required
            />
            <button type="button" class="input-toggle" id="togglePassword" title="Show/hide password">
              👁️
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-lg" id="loginBtn">
          <span id="loginBtnText">Sign In</span>
          <div class="spinner" id="loginSpinner" style="display:none"></div>
        </button>
      </form>

      <p class="auth-footer">DineOS v1.0 &bull; Restricted Access Only</p>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
